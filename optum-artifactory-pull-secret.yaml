# This file contains both SecretStore and ExternalSecret in correct order
#
# DEPLOYMENT ORDER: SecretStore (first) -> ExternalSecret (second) in same file

# ===============================================================================
# 1. AZURE KEY VAULT SECRET STORE (Created First)
# ===============================================================================
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: pe-admin-prd-kv-secret-store
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    azurekv:
      # Azure Key Vault URL
      vaultUrl: {{ .Values.peAdminKeyVaultUrl }}

      # Authentication type - using Managed Identity assigned to AKS cluster
      authType: ManagedIdentity

      # Azure Tenant ID
      tenantId: {{ .Values.tenantId }}

      # Managed Identity Client ID
      identityId: {{ .Values.peAdminKeyVaultIdentityId }}

      # Environment type for Azure cloud
      environmentType: PublicCloud

---
# ===============================================================================
# 2. EXTERNAL SECRET FOR JFROG CREDENTIALS (Created Second, depends on SecretStore above)
# ===============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: optum-saas-image-pull-secret
  namespace: {{ .Release.Namespace }}
spec:
  # Refresh interval - how often to check for updated secrets in Azure Key Vault
  refreshInterval: 1h

  # Reference to the SecretStore created above in this same file
  secretStoreRef:
    name: pe-admin-prd-kv-secret-store
    kind: SecretStore
  # Data extraction from Azure Key Vault
  data:
    - secretKey: OptumSaasArtifactory
      remoteRef:
        key: OptumSaasArtifactory
  # Target Kubernetes secret configuration
  target:
    name: optum-saas-image-pull-secret
    creationPolicy: Owner
    template:
      # Create Docker registry authentication secret
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "https://centraluhg.jfrog.io": {
                "username": "rxn_pe_automation@optum.com",
                "password": "{{ "{{" }} .OptumSaasArtifactory {{ "}}" }}",
                "auth": "{{ "{{" }} printf "%s:%s" "rxn_pe_automation@optum.com" .OptumSaasArtifactory | b64enc {{ "}}" }}"
              }
            }
          }
