# ars-ui — team01 environment properties
# Loaded via ConfigMap into the container at runtime


server.port=8090
server.ssl.enabled=true
server.ssl.key-store=/tls/keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=${server-ssl-keyStorePassword}

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Logging ---
logging.level.com.rx.ars=DEBUG


# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# --- Azure Key Vault (used by KeyVaultConfig/KeyVaultComponent) ---
com.rx.ars.azure.key.vault.uri= https://rxn-cs-ars-tm1-kv.vault.azure.net/
com.rx.ars.azure.key.vault.client.id= 624b5b3a-27e4-49f0-bd18-9d67dc659869


# --- OAuth2 / JWT ---
sentinel.issuer-uri=https://idx-stage.linkhealth.com/auth/realms/developer-platform