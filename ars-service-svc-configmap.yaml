{{- if .Values.arsServiceSvc.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ars-service-svc.fullname" . }}
  labels:
    {{- include "ars-service-svc.labels" . | nindent 4 }}
data:
  {{- $file := printf "config/ars-service-svc-%s-k8s.properties" .Values.sdlcEnvironment }}
  application.properties: |-
{{ .Files.Get $file | indent 4 }}
{{- end }}
