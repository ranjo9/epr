{{- if .Values.arsServiceSvc.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ars-service-svc-secretproviderclass
spec:
  provider: azure

  # ------------------------------------------------------------------
  # Kubernetes Secrets to be created by CSI
  # ------------------------------------------------------------------
  secretObjects:
    # ---------------------------------------------------------------
    # SSL keystore password (used by Spring Boot)
    # ---------------------------------------------------------------
    - secretName: {{ include "ars-service-svc.fullname" . }}
      type: Opaque
      data:
        - objectName: server-ssl-keyStorePassword
          key: server-ssl-keyStorePassword

    # ---------------------------------------------------------------
    # Oracle credentials (EPS / REG / SECADMIN)
    # ---------------------------------------------------------------
    - secretName: oracle-credentials
      type: Opaque
      data:
        - objectName: oracle-eps-username
          key: oracle-eps-username
        - objectName: oracle-eps-password
          key: oracle-eps-password

  # ------------------------------------------------------------------
  # Azure Key Vault access configuration
  # ------------------------------------------------------------------
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: {{ .Values.arsServiceSvc.userassignedidentityid }}
    keyvaultName: {{ .Values.arsServiceSvc.keyvaultname }}
    tenantId: {{ .Values.arsServiceSvc.tenantid }}

    # IMPORTANT: sync secrets into Kubernetes Secret objects
    syncSecret: "true"

    objects: |
      array:
        - |
          objectName: server-ssl-keyStorePassword
          objectType: secret
        - |
          objectName: oracle-eps-username
          objectType: secret
        - |
          objectName: oracle-eps-password
          objectType: secret

{{- end }}