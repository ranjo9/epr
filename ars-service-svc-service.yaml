{{- if .Values.arsServiceSvc.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ars-service-svc.fullname" . }}
  labels:
    {{- include "ars-service-svc.labels" . | nindent 4 }}
spec:
  type: {{ .Values.arsServiceSvc.service.type }}
  ports:
    - port: {{ .Values.arsServiceSvc.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ars-service-svc.selectorLabels" . | nindent 4 }}
{{- end }}
